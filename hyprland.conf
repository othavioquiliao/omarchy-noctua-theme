# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColorBlue = rgb(61afef)
$activeBorderColorDark = rgb(2f4154)

general {
    col.active_border = $activeBorderColorBlue $activeBorderColorDark 35deg
}

group {
    col.border_active = $activeBorderColorBlue $activeBorderColorDark 35deg
}

decoration {
    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(0, 0, 0, 0.6)
        offset = 2 2
    }
}

animations {
  enabled = yes

  bezier = noctua,  0.55, 0.02, 0.38, 0.98
  bezier = midnight, 0.70, 0.01, 0.30, 1.00
  bezier = pulse,   0.85, 0.00, 0.25, 1.00

  # Base window animation (neutral)
  animation = windows,     1, 4, noctua

  # IMPORTANT: Disable transform-based open/close animations (no popin/slide/etc.)
  animation = windowsIn,   0,  0, default
  animation = windowsOut,  0,  0, default

  # Tiling / reflow: either keep it minimal or disable it entirely
  animation = windowsMove, 1,  3, noctua
  # If you want zero geometry animation, use this instead:
  # animation = windowsMove, 0, 0, default

  # Slow fades keep theme changes calm and readable
  animation = fade,        1, 4, midnight
  animation = fadeIn,      1, 4, midnight
  animation = fadeOut,     1, 3, midnight


  # Workspaces: use fade style here (this one accepts fade)
  animation = workspaces,  1, 3, midnight, fade
}




